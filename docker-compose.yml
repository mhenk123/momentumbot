services:
  momentumbot:
    build: .
    container_name: momentumbot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      # Ganzes data/-Verzeichnis mounten – keine einzelnen Datei-Mounts mehr.
      # Docker erstellt das Verzeichnis auf dem Host automatisch falls nötig.
      - ./data:/app/data
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
